{% extends "layout.html" %}
{% block title %}Nova locacao{% endblock %}

{% block content %}
<h1>Nova locacao</h1>

{% if erro %}
<p class="erro">{{ erro }}</p>
{% endif %}

<form method="POST" action="{{ url_for('locadora.cadastrar') }}">
    <div class="form-grupo">
        <label>Cliente</label>
        <select name="cliente_id" required>
            <option value="">Selecione...</option>
            {% for c in clientes %}
            <option value="{{ c.id }}">{{ c.nome }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-grupo">
        <label>Veiculo</label>
        <select name="veiculo_id" required>
            <option value="">Selecione...</option>
            {% for v in veiculos %}
            <option value="{{ v.id }}">{{ v.modelo }} - {{ v.placa }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-grupo">
        <label>Data inicio</label>
        <input type="date" name="data_inicio" required>
    </div>

    <div class="form-grupo">
        <label>Data fim</label>
        <input type="date" name="data_fim" required>
    </div>

    <div class="form-grupo">
        <label>Valor total (R$)</label>
        <input type="number" name="valor_total" step="any" min="0" required>
    </div>

    <button type="submit">Salvar</button>
</form>

<p><a href="{{ url_for('locadora.index') }}">Voltar</a></p>
{% endblock %}
